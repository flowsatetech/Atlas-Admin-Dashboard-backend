<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$_title_</title>
  <style>
    :root {
      --bg: #f3f1eb;
      --paper: rgba(255, 255, 255, 0.88);
      --paper-border: rgba(32, 28, 22, 0.08);
      --ink: #171512;
      --muted: #6d665e;
      --accent: #5e7ae2;
      --accent-2: #9f7a4a;
      --shadow: 0 30px 80px rgba(33, 30, 24, 0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: radial-gradient(circle at top, #fbfaf7 0%, #f1ece2 38%, #e8e1d6 100%); }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.75;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.9) 0 10%, transparent 11%),
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.72) 0 8%, transparent 9%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.2));
      padding: 22px;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--paper-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid rgba(32, 28, 22, 0.08);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.48));
      font-family: Inter, system-ui, sans-serif;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .brand span {
      color: var(--accent);
    }

    .masthead-links {
      display: flex;
      gap: 18px;
      align-items: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .masthead-links a {
      color: var(--muted);
      text-decoration: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr);
      gap: 28px;
      padding: 42px 28px 28px;
      align-items: start;
    }

    .share-rail {
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      user-select: none;
    }

    .share-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(32, 28, 22, 0.14);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      font-family: Inter, system-ui, sans-serif;
    }

    .share-btn:hover { transform: translateY(-1px); border-color: rgba(94, 122, 226, 0.4); background: white; }

    .article-shell {
      max-width: 820px;
      margin: 0 auto;
    }

    .kicker {
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2.8rem, 5vw, 5.1rem);
      line-height: 0.98;
      letter-spacing: -0.06em;
      text-wrap: balance;
      max-width: 14ch;
      margin-bottom: 18px;
    }

    .excerpt {
      max-width: 62ch;
      font-family: Inter, system-ui, sans-serif;
      font-size: clamp(1rem, 1.6vw, 1.18rem);
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .excerpt:empty {
      display: none;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 8px 0 28px;
      font-family: Inter, system-ui, sans-serif;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8aa3ff, #5e7ae2);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      box-shadow: 0 8px 18px rgba(94, 122, 226, 0.28);
      flex: 0 0 auto;
      overflow: hidden;
      background-repeat: no-repeat;
    }

    .avatar.has-image {
      background-color: #dfe7ff;
    }

    .avatar-text {
      position: relative;
      z-index: 1;
    }

    .author-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .author-name {
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--ink);
    }

    .author-sub {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .author-sub strong {
      color: var(--ink);
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .meta span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(32, 28, 22, 0.08);
    }

    .lead-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(32, 28, 22, 0.16), transparent);
      margin: 10px 0 28px;
    }

    .content {
      font-size: 1.05rem;
      line-height: 1.9;
      max-width: 68ch;
    }

    .content > p:first-child::first-letter {
      float: left;
      font-size: 4.6rem;
      line-height: 0.85;
      padding-right: 0.22em;
      padding-top: 0.06em;
      font-weight: 700;
      color: var(--ink);
    }

    .content h2, .content h3 {
      margin: 2rem 0 0.8rem;
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .content h2 { font-size: 2rem; }
    .content h3 { font-size: 1.5rem; }

    .content p { margin-bottom: 1rem; }

    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 18px;
      margin: 1.25rem 0;
      box-shadow: 0 16px 30px rgba(19, 18, 16, 0.1);
    }

    .content a {
      color: var(--accent);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }

    .content blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.25rem;
      border-left: 4px solid var(--accent);
      background: rgba(94, 122, 226, 0.07);
      border-radius: 0 14px 14px 0;
      color: #3a3b46;
      font-style: italic;
    }

    .tags {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      padding: 0.45rem 0.9rem;
      font-size: 0.82rem;
      color: #4f4a43;
      border: 1px solid rgba(32, 28, 22, 0.08);
      font-family: Inter, system-ui, sans-serif;
    }

    .mobile-share {
      display: none;
      gap: 10px;
      margin: 24px 0 0;
      flex-wrap: wrap;
      font-family: Inter, system-ui, sans-serif;
    }

    .mobile-share button {
      flex: 1 1 0;
      min-width: 120px;
      border-radius: 999px;
      border: 1px solid rgba(32, 28, 22, 0.12);
      background: white;
      color: var(--ink);
      padding: 0.78rem 1rem;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    .footer-note {
      margin-top: 36px;
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.82rem;
      color: var(--muted);
      padding-top: 18px;
      border-top: 1px solid rgba(32, 28, 22, 0.08);
    }

    @media (max-width: 900px) {
      body { padding: 14px; }

      .page { border-radius: 22px; }

      .masthead { padding: 16px 18px; }

      .masthead-links { display: none; }

      .hero {
        grid-template-columns: 1fr;
        gap: 0;
        padding: 28px 18px 22px;
      }

      .share-rail { display: none; }

      .article-shell { max-width: 100%; }

      h1 { max-width: none; }

      .mobile-share { display: flex; }

      .content { font-size: 1rem; }

      .content > p:first-child::first-letter {
        font-size: 3.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="masthead">
      <div class="brand">Atlas<span>.</span></div>
      <nav class="masthead-links" aria-label="Article actions">
        <a href="#" id="copy-link-top">Copy link</a>
      </nav>
    </header>

    <main class="hero">
      <aside class="share-rail" aria-label="Share article">
        <div>Share</div>
        <button class="share-btn" type="button" data-share="x" title="Share on X">X</button>
        <button class="share-btn" type="button" data-share="facebook" title="Share on Facebook">f</button>
        <button class="share-btn" type="button" data-share="copy" title="Copy link">⧉</button>
      </aside>

      <article class="article-shell">
        <div class="kicker">Blog Article</div>
        <h1>$_title_</h1>
        <div class="excerpt">$_excerpt_html_</div>
        <div class="author-row">
          <div class="avatar" style="$_author_avatar_style_" aria-hidden="true"><span class="avatar-text">$_author_initials_</span></div>
          <div class="author-meta">
            <div class="author-name">$_author_name_</div>
            <div class="author-sub"><strong>$_author_role_</strong> · Published on the blog embed</div>
          </div>
        </div>
        <div class="meta">$_meta_html_</div>
        <div class="lead-rule"></div>
        <div class="content">$_content_html_</div>
        $_tags_html_

        <div class="mobile-share">
          <button type="button" data-share="x">Share on X</button>
          <button type="button" data-share="facebook">Share on Facebook</button>
          <button type="button" data-share="copy">Copy link</button>
        </div>
      </article>
    </main>
  </div>

  <script>
    (function () {
      const pageUrl = "$_page_url_";

      function openShareWindow(url) {
        window.open(url, "_blank", "noopener,noreferrer,width=640,height=560");
      }

      async function copyLink() {
        try {
          await navigator.clipboard.writeText(pageUrl);
        } catch (_) {
          const fallback = document.createElement('textarea');
          fallback.value = pageUrl;
          fallback.setAttribute('readonly', 'true');
          fallback.style.position = 'fixed';
          fallback.style.left = '-9999px';
          document.body.appendChild(fallback);
          fallback.select();
          document.execCommand('copy');
          document.body.removeChild(fallback);
        }
      }

      document.querySelectorAll('[data-share]').forEach((button) => {
        button.addEventListener('click', async () => {
          const mode = button.getAttribute('data-share');

          if (mode === 'x') {
            openShareWindow(`https://twitter.com/intent/tweet?url=${encodeURIComponent(pageUrl)}&text=${encodeURIComponent(document.title)}`);
          } else if (mode === 'facebook') {
            openShareWindow(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(pageUrl)}`);
          } else if (mode === 'copy') {
            await copyLink();
          }
        });
      });

      const copyLinkTop = document.getElementById('copy-link-top');
      if (copyLinkTop) {
        copyLinkTop.addEventListener('click', async (event) => {
          event.preventDefault();
          await copyLink();
        });
      }

      try {
        const payload = JSON.stringify({ token: "$_track_token_" });

        if (navigator.sendBeacon) {
          const blob = new Blob([payload], { type: "application/json" });
          navigator.sendBeacon("$_track_url_", blob);
          return;
        }

        fetch("$_track_url_", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: payload,
          keepalive: true,
        });
      } catch (_) {}
    })();
  </script>
</body>
</html>
