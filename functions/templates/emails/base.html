<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .email-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .email-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 24px 32px;
      text-align: center;
    }
    .email-header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }
    .email-body {
      padding: 32px;
      color: #333333;
      line-height: 1.6;
    }
    .email-body h2 {
      color: #1a1a2e;
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 16px;
    }
    .email-body p {
      margin: 0 0 16px;
      font-size: 15px;
    }
    a.btn, .btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: #2563eb !important;
      color: #ffffff !important;
      text-decoration: none !important;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      margin: 8px 0;
    }
    a.btn:hover, .btn:hover {
      background-color: #1d4ed8 !important;
    }
    .email-footer {
      padding: 20px 32px;
      background-color: #f8fafc;
      border-top: 1px solid #e2e8f0;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
    }
    .email-footer p {
      margin: 4px 0;
    }
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px 0; background-color: #f4f6f9;">
    <tr>
      <td align="center">
        <div class="email-wrapper">
          <div class="email-header">
            <h1>Atlas Admin Notifications</h1>
          </div>
          <div class="email-body">
            {{BODY_CONTENT}}
          </div>
          <div class="email-footer">
            <p>&copy; 2026 Atlas Africa. All rights reserved.</p>
            <p>This is an automated message from the Atlas Admin Notifications system.</p>
          </div>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
