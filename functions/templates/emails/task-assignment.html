<h2>New Task Assigned</h2>
<p>Hi {{RECIPIENT_NAME}},</p>

<table style="width: 100%; border-collapse: collapse; margin: 16px 0;">

    <td style="padding: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0;">{{TASK_TITLE}}</td>

    <td style="padding: 12px; border: 1px solid #e2e8f0; font-weight: 600;">Description:</td>
    <td style="padding: 12px; border: 1px solid #e2e8f0;">{{TASK_DESCRIPTION}}</td>
  </tr>

    <td style="padding: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0; font-weight: 600;">Due Date:</td>
    <td style="padding: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0;">{{TASK_DUE_DATE}}</td>
  </tr>
  <tr>
